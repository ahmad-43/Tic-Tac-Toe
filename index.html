<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Games Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .portal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 3rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 600px;
            margin: 2rem 0;
        }

        .portal-container h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-align: center;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
        }

        .game-card {
            display: flex;
            align-items: center;
            background: var(--board-bg);
            padding: 1.5rem;
            border-radius: 15px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-5px);
            background: var(--cell-hover);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 10px 15px rgba(0,0,0,0.2);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .game-icon {
            font-size: 3rem;
            margin-right: 1.5rem;
            width: 80px;
            height: 80px;
            background: var(--cell-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
        }

        .game-info {
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--x-color);
            margin-bottom: 0.5rem;
        }

        .game-desc {
            font-size: 1rem;
            color: rgba(248, 250, 252, 0.7);
        }

        .future-game {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        .future-game:hover {
            transform: none;
            background: var(--board-bg);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.1);
            border-color: transparent;
        }

        @media (max-width: 480px) {
            .portal-container {
                padding: 1.5rem;
            }
            .portal-container h1 {
                font-size: 2.2rem;
            }
            .game-icon {
                width: 60px;
                height: 60px;
                font-size: 2rem;
                margin-right: 1rem;
            }
            .game-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <h1>Mini Games</h1>
        
        <div class="games-list">
            <!-- Tic Tac Toe Game -->
            <a href="tictactoe.html" class="game-card">
                <div class="game-icon">
                    <span style="color: var(--x-color);">X</span><span style="color: var(--o-color);">O</span>
                </div>
                <div class="game-info">
                    <div class="game-title">Tic-Tac-Toe</div>
                    <div class="game-desc">Play the classic strategy game</div>
                </div>
            </a>

            <!-- Rock Paper Scissors Game -->
            <a href="rps.html" class="game-card">
                <div class="game-icon">
                    <span>✊✋✌️</span>
                </div>
                <div class="game-info">
                    <div class="game-title">Rock Paper Scissors</div>
                    <div class="game-desc">The classic hand game</div>
                </div>
            </a>
            
            <!-- Memory Match Game -->
            <a href="memory.html" class="game-card">
                <div class="game-icon">
                    <span>🧠</span>
                </div>
                <div class="game-info">
                    <div class="game-title">Memory Match</div>
                    <div class="game-desc">Test your memory skills</div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>

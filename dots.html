<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dots and Boxes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .dots-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 600px;
        }

        .dots-board-container {
            display: flex;
            justify-content: center;
            padding: 20px;
            background: var(--board-bg);
            border-radius: 15px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 10px 30px rgba(0,0,0,0.3);
            overflow-x: auto;
            max-width: 100%;
        }

        .dots-board {
            display: grid;
            grid-template-columns: repeat(5, 15px 50px) 15px;
            grid-template-rows: repeat(5, 15px 50px) 15px;
            gap: 0;
            background: var(--board-bg);
        }

        .dot {
            width: 15px;
            height: 15px;
            background-color: var(--text-color);
            border-radius: 50%;
            z-index: 2;
        }

        .hline {
            height: 15px;
            width: 50px;
            cursor: pointer;
            background-color: var(--cell-bg);
            transition: background-color 0.2s;
            border-radius: 8px;
            margin-top: 0;
            margin-left: -5px;
            margin-right: -5px;
            z-index: 1;
        }

        .vline {
            width: 15px;
            height: 50px;
            cursor: pointer;
            background-color: var(--cell-bg);
            transition: background-color 0.2s;
            border-radius: 8px;
            margin-left: 0;
            margin-top: -5px;
            margin-bottom: -5px;
            z-index: 1;
        }

        .hline:hover, .vline:hover {
            background-color: var(--cell-hover);
        }

        .hline.active-1, .vline.active-1 {
            background-color: var(--x-color);
            cursor: default;
        }

        .hline.active-2, .vline.active-2 {
            background-color: var(--o-color);
            cursor: default;
        }

        .box {
            width: 50px;
            height: 50px;
            transition: background-color 0.3s;
            border-radius: 4px;
        }

        .box.filled-1 {
            background-color: rgba(56, 189, 248, 0.4);
        }

        .box.filled-2 {
            background-color: rgba(244, 63, 94, 0.4);
        }

        @media (max-width: 480px) {
            .dots-board {
                grid-template-columns: repeat(5, 10px 40px) 10px;
                grid-template-rows: repeat(5, 10px 40px) 10px;
            }
            .dot { width: 10px; height: 10px; }
            .hline { height: 10px; width: 40px; }
            .vline { width: 10px; height: 40px; }
            .box { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
    <a href="index.html">
        <button class="explain-btn">Go back</button>
    </a>
    
    <div class="dots-container container">
        <header>
            <h1>Dots & Boxes</h1>
            <div class="status" id="dots-status">Player 1's Turn</div>
        </header>

        <div class="scoreboard">
            <div class="score-box x-score-box">
                <span class="score-label">Player 1 (Blue)</span>
                <span class="score-value" id="score-p1">0</span>
            </div>
            <div class="score-box o-score-box">
                <span class="score-label">Player 2 (Red)</span>
                <span class="score-value" id="score-p2">0</span>
            </div>
        </div>

        <div class="dots-board-container">
            <div class="dots-board" id="dots-board">
                <!-- Generated by JS -->
            </div>
        </div>

        <button class="reset-btn" id="dots-resetBtn">Restart Game</button>
    </div>

    <script src="dots.js"></script>
</body>
</html>

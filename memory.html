<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .memory-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 600px;
        }

        .stats-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px 20px;
            background: var(--board-bg);
            border-radius: 15px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(248, 250, 252, 0.7);
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--x-color);
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: var(--board-bg);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            perspective: 1000px;
        }

        .memory-card {
            width: 70px;
            height: 70px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
            cursor: pointer;
        }

        .memory-card.flipped {
            transform: rotateY(180deg);
        }

        .memory-card.matched {
            transform: rotateY(180deg) scale(0.95);
            opacity: 0.8;
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .card-front {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .card-front::after {
            content: '?';
            color: rgba(255,255,255,0.5);
            font-size: 2rem;
            font-weight: 800;
        }

        .card-back {
            background: var(--cell-bg);
            transform: rotateY(180deg);
            border: 2px solid var(--x-color);
        }

        .matched .card-back {
            border-color: var(--win-color);
            background: rgba(16, 185, 129, 0.2);
        }

        @media (max-width: 480px) {
            .memory-grid {
                gap: 8px;
                padding: 10px;
            }
            .memory-card {
                width: 60px;
                height: 60px;
            }
            .card-face {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html">
        <button class="explain-btn">Go back</button>
    </a>
    
    <div class="memory-container container">
        <header>
            <h1>Memory Match</h1>
            <div class="status" id="memory-status">Find all pairs!</div>
        </header>

        <div class="stats-board">
            <div class="stat">
                <span class="stat-label">Moves</span>
                <span class="stat-value" id="moves-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Matches</span>
                <span class="stat-value" id="matches-count">0 / 8</span>
            </div>
        </div>

        <div class="memory-grid" id="memory-grid">
            <!-- Cards will be generated here by JS -->
        </div>

        <button class="reset-btn" id="memory-resetBtn">Restart Game</button>
    </div>

    <script src="memory.js"></script>
</body>
</html>
